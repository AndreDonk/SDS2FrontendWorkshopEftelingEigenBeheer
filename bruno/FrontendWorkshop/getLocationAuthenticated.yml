info:
  name: getLocationAuthenticated
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:8080/api/map/4/1
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getEnvVar("JWT_User");
        if (token) {
          req.setHeader("Authorization", `Bearer ${token}`);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
