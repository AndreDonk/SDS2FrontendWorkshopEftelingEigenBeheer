info:
  name: getCurrentPosition
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:8080/api/map/current_position
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getEnvVar("JWT_User");
        if (token) {
          req.setHeader("Authorization", `Bearer ${token}`);
        }
        console.log('token: ' + token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
